name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
    steps:
      - id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "release_tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            os_name: macos
            arch_name: x86_64
            target: x86_64-apple-darwin
            binary_name: pgq
          - runner: macos-15
            os_name: macos
            arch_name: aarch64
            target: aarch64-apple-darwin
            binary_name: pgq
          - runner: ubuntu-24.04
            os_name: linux
            arch_name: x86_64
            target: x86_64-unknown-linux-gnu
            binary_name: pgq
          - runner: ubuntu-24.04-arm
            os_name: linux
            arch_name: aarch64
            target: aarch64-unknown-linux-gnu
            binary_name: pgq
          - runner: windows-2025
            os_name: windows
            arch_name: x86_64
            target: x86_64-pc-windows-msvc
            binary_name: pgq.exe
          - runner: windows-11-arm
            os_name: windows
            arch_name: aarch64
            target: aarch64-pc-windows-msvc
            binary_name: pgq.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release archive
        id: package
        shell: bash
        run: |
          bash scripts/package-release.sh \
            --target "${{ matrix.target }}" \
            --binary "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
            --output-dir dist/releases

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgq-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: |
            dist/releases/pgq-${{ matrix.os_name }}-${{ matrix.arch_name }}.tar.gz
            dist/releases/pgq-${{ matrix.os_name }}-${{ matrix.arch_name }}.zip
          if-no-files-found: ignore

  release:
    needs:
      - meta
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: pgq-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd dist/artifacts
          shopt -s nullglob
          : > SHA256SUMS
          for asset in pgq-*.tar.gz pgq-*.zip; do
            sha256sum "$asset" >> SHA256SUMS
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist/artifacts/*
